<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Verification - GovAssist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .verifying-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .scanner-box {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 40px;
        }

        .scanner-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--card-border);
            border-radius: 20px;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
            border-radius: 5px;
            animation: scan 2s linear infinite alternate;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .ai-icon {
            font-size: 5rem;
            color: var(--primary-blue);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }

        .progress-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        .typing-text {
            font-size: 1.2rem;
            color: var(--gray-text);
            min-height: 30px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--card-border);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="verifying-container">
        <div class="scanner-box">
            <i class="fa-solid fa-brain ai-icon"></i>
            <div class="scanner-line"></div>
        </div>

        <div class="progress-text" id="percentage">0%</div>
        
        <div class="spinner"></div>

        <div class="typing-text" id="typingText">Initiating AI analysis...</div>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const percentageEl = document.getElementById('percentage');
            const typingTextEl = document.getElementById('typingText');
            
            const messages = [
                "Analyzing eligibility parameters...",
                "Cross-referencing with state and central schemes...",
                "Checking financial criteria and documentation requirements...",
                "Generating personalized recommendations...",
                "Finalizing results..."
            ];

            let progress = 0;
            let messageIndex = 0;

            const updateProgress = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(updateProgress);
                    setTimeout(() => {
                        window.location.href = 'results.html';
                    }, 500);
                }
                
                percentageEl.innerText = `${progress}%`;
            }, 150);

            const updateMessage = setInterval(() => {
                messageIndex++;
                if (messageIndex < messages.length) {
                    typingTextEl.innerText = messages[messageIndex];
                } else {
                    clearInterval(updateMessage);
                }
            }, 1200);
        });
    </script>
</body>
</html>
