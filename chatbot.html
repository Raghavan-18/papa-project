<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - GovAssist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            padding: 100px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .chat-header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            display: flex;
            gap: 10px;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .bot .message-bubble {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-top-left-radius: 5px;
            color: var(--white-text);
        }

        .user .message-bubble {
            background: var(--gradient-primary);
            border-top-right-radius: 5px;
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .message-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--darker-bg);
            border: 1px solid var(--card-border);
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            background: var(--dark-bg);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 12px 20px;
            color: var(--white-text);
            font-size: 1rem;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition-fast);
        }

        .btn-voice {
            background: rgba(255, 255, 255, 0.05);
            color: var(--gray-text);
            border: 1px solid var(--card-border);
        }
        
        .btn-voice:hover {
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .btn-send {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            gap: 5px;
            padding: 10px 15px;
        }
        
        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: bounce 1.3s linear infinite;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <i class="fa-solid fa-landmark-dome"></i> GovAssist
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="results.html">Schemes</a>
                <a href="eligibility.html">Eligibility</a>
                <a href="chatbot.html" style="color: var(--accent-cyan)">Chatbot</a>
                <a href="login.html" class="btn btn-primary" id="navAuthBtn" style="padding: 8px 16px;">Login</a>
            </div>
        </div>
    </nav>

    <div class="chat-container reveal active">
        <div class="chat-box">
            <div class="chat-header">
                <div class="chat-header-icon">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h3 style="margin: 0;">GovAssist AI</h3>
                    <div style="font-size: 0.8rem; color: #10b981;">
                        <i class="fa-solid fa-circle" style="font-size: 0.6rem;"></i> Online
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages will appear here -->
                
                <!-- Typing Indicator -->
                <div class="message bot typing-message" id="typingMessage" style="display: none;">
                    <div class="message-icon"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-bubble typing-indicator" id="typingIndicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <button class="btn-icon btn-voice" title="Voice Input">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                <button class="btn-icon btn-send" id="sendBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
    <script type="module" src="navAuth.js"></script>
    <script type="module" src="chatbot.js"></script>
</body>
</html>
